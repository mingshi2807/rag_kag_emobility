services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-ocpp-pg
    shm_size: 2gb
    environment:
      POSTGRES_DB: ${PG_DATABASE:-rag_kag}
      POSTGRES_USER: ${PG_USER:-rag_kag}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-rag_kag}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/rag_ocpp/storage/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      -c shared_buffers=2GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
      -c effective_cache_size=6GB
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_connections=50
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-rag} -d ${PG_DATABASE:-rag_ocpp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
